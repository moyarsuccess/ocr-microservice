server.port=3001
spring.application.name=ocr-microservice

# We allow overriding the path, but inside docker this should be correct.
# Usually alpine tesseract-ocr data path is /usr/share/tessdata
tesseract.datapath=${TESSERACT_DATA_PATH:/usr/share/tessdata}
tesseract.language=${TESSERACT_LANGUAGE:eng}

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
