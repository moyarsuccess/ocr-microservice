server.port=${SERVER_PORT:3001}
spring.application.name=ocr-microservice
server.forward-headers-strategy=framework

# Multipart upload limits (passport/bank-statement PDFs can be large)
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:200MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE:200MB}

# ------------------------------------------------------------------------
# Hybrid OCR engine configuration — bound to com.ocr.config.OcrProperties
# ------------------------------------------------------------------------

# Stage 1 — Tesseract
ocr.tesseract.data-path=${TESSERACT_DATA_PATH:/usr/share/tessdata}
ocr.tesseract.language=${TESSERACT_LANGUAGE:eng+fra}
ocr.tesseract.pdf-dpi=${TESSERACT_PDF_DPI:300}
ocr.tesseract.max-pages=${OCR_MAX_PAGES:30}

# Stages 2 & 4 — Ollama
# ⚠️ The default endpoint is on the public internet (ollama.flutra.ca). PII flows
# over the wire on every call — confirm TLS termination + DPA before processing
# real applicant data.
ocr.ollama.base-url=${OLLAMA_BASE_URL:https://ollama.flutra.ca}
ocr.ollama.classifier-model=${OLLAMA_CLASSIFIER_MODEL:llama3.2:3b}
ocr.ollama.vision-model=${OLLAMA_VISION_MODEL:qwen2.5vl:7b}
ocr.ollama.timeout-seconds=${OLLAMA_TIMEOUT_SECONDS:180}
# Comma-separated allowlist; leave empty to disable enforcement (dev only).
ocr.ollama.allowed-models=${OLLAMA_ALLOWED_MODELS:llama3.2:3b,qwen2.5vl:7b,qwen2.5vl:3b}

# Pipeline thresholds
ocr.pipeline.rule-classifier-min-confidence=${OCR_RULES_MIN_CONFIDENCE:0.55}
ocr.pipeline.rule-classifier-min-margin=${OCR_RULES_MIN_MARGIN:0.15}
ocr.pipeline.include-raw-text-by-default=${OCR_INCLUDE_RAW_TEXT:false}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.url=/api-docs
